<script type="text/babel">
  const { useState, useMemo, useRef, useEffect } = React;

  // ================================================================

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyDnMADYimwK6FG_vZx37M0TSn5fytzwDOU",
    authDomain:        "habit-tracker-a86af.firebaseapp.com",
    projectId:         "habit-tracker-a86af",
    storageBucket:     "habit-tracker-a86af.firebasestorage.app",
    messagingSenderId: "824558248982",
    appId:             "1:824558248982:web:cf23956dacd6783ae04137",
  };

  const CONFIG_READY = FIREBASE_CONFIG.apiKey !== "REPLACE_ME";
  let db, auth, googleProvider;
  if (CONFIG_READY) {
    firebase.initializeApp(FIREBASE_CONFIG);
    db   = firebase.firestore();
    auth = firebase.auth();
    googleProvider = new firebase.auth.GoogleAuthProvider();
  }

  // ── Constants ──────────────────────────────────────────────────────
  const COLORS = [
    {bg:"bg-violet-500",light:"bg-violet-100",text:"text-violet-700",border:"border-violet-400",hex:"#8b5cf6"},
    {bg:"bg-sky-500",   light:"bg-sky-100",   text:"text-sky-700",   border:"border-sky-400",   hex:"#0ea5e9"},
    {bg:"bg-emerald-500",light:"bg-emerald-100",text:"text-emerald-700",border:"border-emerald-400",hex:"#10b981"},
    {bg:"bg-rose-500",  light:"bg-rose-100",  text:"text-rose-700",  border:"border-rose-400",  hex:"#f43f5e"},
    {bg:"bg-amber-500", light:"bg-amber-100", text:"text-amber-700", border:"border-amber-400", hex:"#f59e0b"},
    {bg:"bg-pink-500",  light:"bg-pink-100",  text:"text-pink-700",  border:"border-pink-400",  hex:"#ec4899"},
    {bg:"bg-teal-500",  light:"bg-teal-100",  text:"text-teal-700",  border:"border-teal-400",  hex:"#14b8a6"},
    {bg:"bg-orange-500",light:"bg-orange-100",text:"text-orange-700",border:"border-orange-400",hex:"#f97316"},
  ];
  const EMOJIS = ["📰","🤖","🏃","📚","🧘","💧","🎸","✍️","🍎","💻","🌿","🎨"];
  const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAY_NAMES   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const todayDate   = new Date(); todayDate.setHours(0,0,0,0);

  function toDateKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }

  // ── Quarter helpers ────────────────────────────────────────────────
  function getQuarterNum(date)   { return Math.floor(date.getMonth()/3)+1; }
  function getQuarterKey(date)   { return `${date.getFullYear()}-Q${getQuarterNum(date)}`; }
  function getQuarterStart(date) { return new Date(date.getFullYear(), Math.floor(date.getMonth()/3)*3, 1); }
  function getQuarterLabel(date) {
    const q=getQuarterNum(date), sm=Math.floor(date.getMonth()/3)*3;
    return `Q${q} ${date.getFullYear()} (${MONTH_NAMES[sm].slice(0,3)}–${MONTH_NAMES[sm+2].slice(0,3)})`;
  }

  function defaultHabits() {
    const start = toDateKey(new Date(todayDate.getFullYear(), todayDate.getMonth(), 1));
    return [
      {id:1,name:"Read the News",emoji:"📰",colorIdx:0,logs:{},createdAt:start,totalDays:0,totalSessions:0,dailyTarget:0,lastSessionDate:'',todaySessions:0},
      {id:2,name:"AI Course",    emoji:"🤖",colorIdx:1,logs:{},createdAt:start,totalDays:0,totalSessions:0,dailyTarget:0,lastSessionDate:'',todaySessions:0},
      {id:3,name:"Exercise",     emoji:"🏃",colorIdx:2,logs:{},createdAt:start,totalDays:0,totalSessions:0,dailyTarget:0,lastSessionDate:'',todaySessions:0},
    ];
  }

  function ensureFields(h) {
    return {
      id:h.id||0, name:h.name||'', emoji:h.emoji||'📚', colorIdx:h.colorIdx||0,
      logs:h.logs||{}, createdAt:h.createdAt||toDateKey(todayDate),
      totalDays:h.totalDays||0, totalSessions:h.totalSessions||0,
      dailyTarget:h.dailyTarget||0, lastSessionDate:h.lastSessionDate||'', todaySessions:h.todaySessions||0,
    };
  }

  // ── Firestore helpers ──────────────────────────────────────────────
  const habitRef    = (uid,id)  => db.doc(`users/${uid}/habits/${id}`);
  const appRef      = (uid)     => db.doc(`users/${uid}/meta/app`);
  const sessionRef  = (uid,id,mk) => db.doc(`users/${uid}/habits/${id}/sessions/${mk}`);

  async function fsWriteHabit(uid, habit) {
    await habitRef(uid, habit.id).set(habit);
  }
  async function fsWriteApp(uid, nextId, habitIds) {
    await appRef(uid).set({ nextId, habitIds, updatedAt: new Date().toISOString() });
  }
  async function fsWriteSession(uid, record) {
    const mk = (record.endedAt||new Date().toISOString()).slice(0,7);
    const ref = sessionRef(uid, record.habitId, mk);
    const snap = await ref.get();
    const records = snap.exists ? (snap.data().records||[]) : [];
    records.push(record);
    await ref.set({records});
  }
  async function fsLoadSessions(uid, habitId) {
    const snap = await db.collection(`users/${uid}/habits/${habitId}/sessions`).get();
    const out = [];
    snap.forEach(d => { const r=d.data(); if(Array.isArray(r.records)) out.push(...r.records); });
    return out.sort((a,b)=>(b.endedAt||'').localeCompare(a.endedAt||''));
  }
  async function fsDeleteHabit(uid, habitId) {
    const snap = await db.collection(`users/${uid}/habits/${habitId}/sessions`).get();
    const batch = db.batch();
    snap.forEach(d => batch.delete(d.ref));
    batch.delete(habitRef(uid, habitId));
    await batch.commit();
  }

  // ── Quarterly cleanup ──────────────────────────────────────────────
  async function runQuarterlyCleanup(uid, habitsData) {
    const currentQ  = getQuarterKey(todayDate);
    const qStartKey = toDateKey(getQuarterStart(todayDate));
    const batch     = db.batch();
    // Strip logs older than current quarter from every habit
    habitsData.forEach(h => {
      const kept = {};
      Object.keys(h.logs||{}).forEach(k => { if(k >= qStartKey) kept[k] = true; });
      batch.update(habitRef(uid, h.id), { logs: kept });
    });
    // Also delete session docs from months before this quarter
    // (fire-and-forget per habit, outside batch to avoid 500-op limit)
    habitsData.forEach(async h => {
      try {
        const sesSnap = await db.collection(`users/${uid}/habits/${h.id}/sessions`).get();
        const sessBatch = db.batch();
        sesSnap.forEach(d => { if(d.id < qStartKey.slice(0,7)) sessBatch.delete(d.ref); });
        await sessBatch.commit();
      } catch(e) { console.error('session cleanup', e); }
    });
    // Record that we've cleaned up for this quarter
    batch.set(appRef(uid), { lastCleanupQuarter: currentQ }, { merge: true });
    await batch.commit();
  }

  // ── App ────────────────────────────────────────────────────────────
  function App() {
    // Core state
    const [habits, setHabitsRaw]       = useState(defaultHabits);
    const [nextId, setNextIdRaw]       = useState(4);
    const [selectedId, setSelectedId]  = useState(1);
    const [viewMonth, setViewMonth]    = useState(todayDate.getMonth());
    const [viewYear, setViewYear]      = useState(todayDate.getFullYear());
    const [showModal, setShowModal]    = useState(false);
    const [newName, setNewName]        = useState("");
    const [newEmoji, setNewEmoji]      = useState("📚");
    const [newColorIdx, setNewColorIdx]= useState(3);
    const [view, setView]              = useState('home');
    const [detailTab, setDetailTab]    = useState('calendar');
    const [isMobile, setIsMobile]      = useState(()=>window.innerWidth<640);

    // Auth / sync state
    const [authStatus, setAuthStatus]  = useState('loading'); // loading|no-config|signed-out|signed-in
    const [syncStatus, setSyncStatus]  = useState('idle');    // idle|saving|synced|error
    const [user, setUser]              = useState(null);
    const [authError, setAuthError]    = useState('');

    // Timer state
    const [timerPhase, setTimerPhase]             = useState('idle');
    const [timerHabitId, setTimerHabitId]         = useState(null);
    const [timerSecondsLeft, setTimerSecondsLeft] = useState(25*60);
    const [timerDuration, setTimerDuration]       = useState(25);
    const [timerTag, setTimerTag]                 = useState('');
    const [sessionNote, setSessionNote]           = useState('');
    const [pendingSession, setPendingSession]     = useState(null);
    const [breakDuration, setBreakDuration]       = useState(5);

    // Sessions log
    const [loadedSessions, setLoadedSessions]     = useState([]);
    const [sessionsLoading, setSessionsLoading]   = useState(false);
    const [notifPermission, setNotifPermission]   = useState(
      ()=> typeof Notification!=='undefined' ? Notification.permission : 'denied'
    );

    // Refs
    const habitsRef          = useRef(defaultHabits());
    const nextIdRef          = useRef(4);
    const userRef            = useRef(null);
    const unsubHabitsRef     = useRef(null);
    const appHabitIdsRef     = useRef([]);
    const initializedRef     = useRef(false);
    const timerEndTimeRef    = useRef(null);
    const timerHabitIdRef    = useRef(null);
    const timerIntervalRef   = useRef(null);
    const timerDurationRef   = useRef(25);
    const timerTagRef        = useRef('');
    const sessionStartTimeRef= useRef(null);
    const sessionCountRef    = useRef({});
    const sessionNoteRef     = useRef('');

    // ── Auth init ──────────────────────────────────────────────────
    useEffect(() => {
      if (!CONFIG_READY) { setAuthStatus('no-config'); return; }
      // Persist session in localStorage so user stays signed in across visits
      auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(console.error);
      // Handle redirect sign-in result (needed for mobile)
      auth.getRedirectResult().catch(console.error);

      const unsub = auth.onAuthStateChanged(async u => {
        if (u) {
          userRef.current = u;
          setUser(u);
          setAuthStatus('signed-in');
          initializedRef.current = false; // reset so initUserData runs fresh
          await initUserData(u.uid);
        } else {
          if (unsubHabitsRef.current) { unsubHabitsRef.current(); unsubHabitsRef.current = null; }
          userRef.current = null;
          setUser(null);
          setAuthStatus('signed-out');
        }
      });
      return () => unsub();
    }, []);

    async function initUserData(uid) {
      setSyncStatus('loading');
      try {
        // Load app config (for habit ordering)
        const appSnap = await appRef(uid).get();
        const appData = appSnap.exists ? appSnap.data() : null;
        if (appData) {
          nextIdRef.current = appData.nextId || 4;
          setNextIdRaw(appData.nextId || 4);
          appHabitIdsRef.current = appData.habitIds || [];
        }

        // Repair todaySessions: recompute from actual session records in case
        // the stored counter got out of sync (runs every load, cheap — 1 doc/habit)
        try {
          const todayKey = toDateKey(todayDate);
          const mk = todayKey.slice(0,7);
          const hSnap = await db.collection(`users/${uid}/habits`).get();
          const repairBatch = db.batch();
          let dirty = false;
          for (const hDoc of hSnap.docs) {
            const h = hDoc.data();
            const stored = h.lastSessionDate===todayKey ? (h.todaySessions||0) : 0;
            const sesSnap = await db.doc(`users/${uid}/habits/${h.id}/sessions/${mk}`).get();
            const records = sesSnap.exists ? (sesSnap.data().records||[]) : [];
            const actual  = records.filter(r=>r.endedAt&&toDateKey(new Date(r.endedAt))===todayKey).length;
            if (stored !== actual) {
              repairBatch.update(habitRef(uid, h.id), {
                todaySessions:  actual,
                lastSessionDate: actual>0 ? todayKey : (h.lastSessionDate||''),
              });
              dirty = true;
            }
          }
          if (dirty) await repairBatch.commit();
        } catch(e) { console.error('repair todaySessions', e); }

        // Quarterly cleanup: runs once per quarter on first load
        const currentQ = getQuarterKey(todayDate);
        if ((appData?.lastCleanupQuarter || '') !== currentQ) {
          const habitsSnap = await db.collection(`users/${uid}/habits`).get();
          const habitsData = [];
          habitsSnap.forEach(d => habitsData.push(d.data()));
          if (habitsData.length > 0) {
            await runQuarterlyCleanup(uid, habitsData);
          } else {
            await appRef(uid).set({ lastCleanupQuarter: currentQ }, { merge: true });
          }
        }

        // Clean up previous listener
        if (unsubHabitsRef.current) { unsubHabitsRef.current(); unsubHabitsRef.current = null; }

        // Real-time listener on habits collection
        const unsub = db.collection(`users/${uid}/habits`).onSnapshot(snap => {
          const serverHabits = [];
          snap.forEach(d => serverHabits.push(ensureFields(d.data())));

          if (serverHabits.length === 0 && !initializedRef.current) {
            // First-time user — seed with defaults
            initializedRef.current = true;
            const defs = defaultHabits();
            habitsRef.current = defs;
            setHabitsRaw(defs);
            setSelectedId(defs[0].id);
            const batch = db.batch();
            batch.set(appRef(uid), { nextId: 4, habitIds: defs.map(h=>h.id), updatedAt: new Date().toISOString() });
            defs.forEach(h => batch.set(habitRef(uid,h.id), h));
            batch.commit().catch(console.error);
            appHabitIdsRef.current = defs.map(h=>h.id);
          } else if (serverHabits.length > 0) {
            initializedRef.current = true;
            // Merge server data with local — never let a stale snapshot overwrite
            // session-count fields that are newer in local state
            const local = habitsRef.current;
            const merged = serverHabits.map(sh => {
              const lh = local.find(h => h.id === sh.id);
              if (!lh) return sh;
              const ld = lh.lastSessionDate || '';
              const sd = sh.lastSessionDate || '';
              if (ld > sd) {
                // Local has a newer session date — keep local counts
                return {...sh, totalSessions: lh.totalSessions, todaySessions: lh.todaySessions, lastSessionDate: lh.lastSessionDate};
              }
              if (ld === sd) {
                // Same date (e.g. two devices used today) — take the higher counts
                return {...sh,
                  totalSessions: Math.max(lh.totalSessions||0, sh.totalSessions||0),
                  todaySessions: Math.max(lh.todaySessions||0, sh.todaySessions||0),
                };
              }
              return sh; // server is newer — use server as-is
            });
            // Sort by saved order
            const ids = appHabitIdsRef.current;
            const ordered = ids.map(id => merged.find(h=>h.id===id)).filter(Boolean);
            const extra   = merged.filter(h => !ids.includes(h.id));
            const all     = [...ordered, ...extra];
            habitsRef.current = all;
            setHabitsRaw(all);
            setSelectedId(prev => all.find(h=>h.id===prev) ? prev : all[0]?.id);
          }
          setSyncStatus('synced');
        }, err => { console.error(err); setSyncStatus('error'); });

        unsubHabitsRef.current = unsub;
      } catch(e) { console.error(e); setSyncStatus('error'); }
    }

    async function signIn() {
      setAuthError('');
      try {
        await auth.signInWithPopup(googleProvider);
      } catch(e) {
        console.error('signIn error:', e.code, e.message);
        if (e.code === 'auth/popup-blocked' || e.code === 'auth/cancelled-popup-request') {
          try { await auth.signInWithRedirect(googleProvider); } catch(e2) { setAuthError(e2.message); }
        } else if (e.code === 'auth/popup-closed-by-user') {
          setAuthError('Popup was closed. Please try again.');
        } else {
          setAuthError(`${e.code}: ${e.message}`);
        }
      }
    }
    async function signOut() {
      if (unsubHabitsRef.current) { unsubHabitsRef.current(); unsubHabitsRef.current = null; }
      await auth.signOut();
    }

    const canSave = () => !!userRef.current;

    function saveHabit(habit) {
      if (!canSave()) return;
      setSyncStatus('saving');
      fsWriteHabit(userRef.current.uid, habit)
        .then(()=>setSyncStatus('synced'))
        .catch(e=>{ console.error(e); setSyncStatus('error'); });
    }
    function saveApp() {
      if (!canSave()) return;
      fsWriteApp(userRef.current.uid, nextIdRef.current, habitsRef.current.map(h=>h.id)).catch(console.error);
    }

    // ── Calendar helpers ───────────────────────────────────────────
    const selectedHabit = habits.find(h=>h.id===selectedId);
    const color         = selectedHabit ? COLORS[selectedHabit.colorIdx] : COLORS[0];
    const daysInMonth   = new Date(viewYear, viewMonth+1, 0).getDate();
    const firstDay      = new Date(viewYear, viewMonth, 1).getDay();

    const calendarDays = useMemo(()=>{
      const d=[];
      for(let i=0;i<firstDay;i++) d.push(null);
      for(let i=1;i<=daysInMonth;i++) d.push(i);
      return d;
    },[viewYear,viewMonth,firstDay,daysInMonth]);

    function toggleDay(day) {
      if(!day) return;
      const date=new Date(viewYear,viewMonth,day); date.setHours(0,0,0,0);
      if(date>todayDate) return;
      const key=toDateKey(date);
      setHabitsRaw(prev=>{
        const next=prev.map(h=>{
          if(h.id!==selectedId) return h;
          const logs={...h.logs}; const was=!!logs[key];
          if(was) delete logs[key]; else logs[key]=true;
          return {...h,logs,totalDays:(h.totalDays||0)+(was?-1:1)};
        });
        habitsRef.current=next;
        const upd=next.find(h=>h.id===selectedId);
        if(upd) saveHabit(upd);
        return next;
      });
    }

    function toggleToday(habitId) {
      const key=toDateKey(todayDate);
      setHabitsRaw(prev=>{
        const next=prev.map(h=>{
          if(h.id!==habitId) return h;
          const logs={...h.logs}; const was=!!logs[key];
          if(was) delete logs[key]; else logs[key]=true;
          return {...h,logs,totalDays:(h.totalDays||0)+(was?-1:1)};
        });
        habitsRef.current=next;
        const upd=next.find(h=>h.id===habitId);
        if(upd) saveHabit(upd);
        return next;
      });
    }

    function prevMonth(){ if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); }
    function nextMonth(){
      const nm=viewMonth===11?0:viewMonth+1, ny=viewMonth===11?viewYear+1:viewYear;
      if(ny>todayDate.getFullYear()||(ny===todayDate.getFullYear()&&nm>todayDate.getMonth())) return;
      setViewMonth(nm); setViewYear(ny);
    }
    const isNextDisabled = viewYear>todayDate.getFullYear()||(viewYear===todayDate.getFullYear()&&viewMonth>=todayDate.getMonth());
    const isToday  = d => d===todayDate.getDate()&&viewMonth===todayDate.getMonth()&&viewYear===todayDate.getFullYear();
    const isFuture = d => !!d && new Date(viewYear,viewMonth,d)>todayDate;
    const isDone   = d => !!d&&!!selectedHabit&&!!selectedHabit.logs[toDateKey(new Date(viewYear,viewMonth,d))];

    // ── Notifications ─────────────────────────────────────────────
    function fireNotif(title,body){
      if(typeof Notification==='undefined'||Notification.permission!=='granted') return;
      try{ new Notification(title,{body}); }catch{}
    }

    // ── Pomodoro ──────────────────────────────────────────────────
    const fmt = s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

    function startPomodoro(habitId) {
      const secs=timerDuration*60;
      timerHabitIdRef.current=habitId; timerDurationRef.current=timerDuration;
      timerTagRef.current=timerTag; sessionStartTimeRef.current=new Date().toISOString();
      timerEndTimeRef.current=Date.now()+secs*1000;
      setTimerHabitId(habitId); setTimerSecondsLeft(secs); setTimerPhase('running');
      if(typeof Notification!=='undefined'&&Notification.permission==='default')
        Notification.requestPermission().then(p=>setNotifPermission(p));
    }

    function recordSession(habitId) {
      const todayKey=toDateKey(todayDate);
      setHabitsRaw(prev=>{
        const next=prev.map(h=>{
          if(h.id!==habitId) return h;
          const same=h.lastSessionDate===todayKey;
          return {...h,totalSessions:(h.totalSessions||0)+1,lastSessionDate:todayKey,todaySessions:same?(h.todaySessions||0)+1:1};
        });
        habitsRef.current=next;
        const upd=next.find(h=>h.id===habitId);
        if(upd) saveHabit(upd);
        return next;
      });
      sessionCountRef.current[habitId]=(sessionCountRef.current[habitId]||0)+1;
      setPendingSession({
        id:`${habitId}-${Date.now()}`,habitId,
        startedAt:sessionStartTimeRef.current||new Date().toISOString(),
        endedAt:new Date().toISOString(),
        durationMins:timerDurationRef.current||25,
        tag:timerTagRef.current||'',
      });
      const h=habitsRef.current.find(h=>h.id===habitId);
      fireNotif('Session complete! 🍅',`+1 for ${h?.name}. Take a break!`);
    }

    function discardSession() {
      // Undo the totalSessions / todaySessions increment from recordSession
      const habitId = timerHabitIdRef.current;
      setHabitsRaw(prev=>{
        const next=prev.map(h=>{
          if(h.id!==habitId) return h;
          const newTotal=Math.max(0,(h.totalSessions||0)-1);
          const newToday=Math.max(0,(h.todaySessions||0)-1);
          return {...h,totalSessions:newTotal,todaySessions:newToday,
            lastSessionDate:newToday===0?'':h.lastSessionDate};
        });
        habitsRef.current=next;
        const upd=next.find(h=>h.id===habitId);
        if(upd) saveHabit(upd);
        return next;
      });
      sessionCountRef.current[habitId]=Math.max(0,(sessionCountRef.current[habitId]||1)-1);
      setPendingSession(null); setSessionNote('');
      setTimerPhase('idle'); setTimerHabitId(null); setTimerSecondsLeft(25*60);
    }

    function startBreak() {
      const count=sessionCountRef.current[timerHabitIdRef.current]||0;
      const dur=count%4===0?15:5;
      setBreakDuration(dur);
      timerEndTimeRef.current=Date.now()+dur*60*1000;
      setTimerSecondsLeft(dur*60); setTimerPhase('break');
    }

    async function saveCurrentNote(note) {
      if(!pendingSession) return;
      const trimmed=(note||'').trim();
      const record={...pendingSession};
      if(trimmed) record.note=trimmed; // omit field entirely if no note
      setPendingSession(null); setSessionNote('');
      if(canSave()) await fsWriteSession(userRef.current.uid, record).catch(console.error);
    }

    function cancelAll() {
      clearInterval(timerIntervalRef.current);
      setTimerPhase('idle'); setTimerHabitId(null);
      setTimerSecondsLeft(25*60); setPendingSession(null); setSessionNote('');
    }

    useEffect(()=>{
      if(timerPhase!=='running') return;
      timerIntervalRef.current=setInterval(()=>{
        const left=Math.max(0,Math.round((timerEndTimeRef.current-Date.now())/1000));
        setTimerSecondsLeft(left);
        if(left===0){ clearInterval(timerIntervalRef.current); recordSession(timerHabitIdRef.current); setTimerPhase('done'); }
      },500);
      return()=>clearInterval(timerIntervalRef.current);
    },[timerPhase]);

    useEffect(()=>{
      if(timerPhase!=='break') return;
      timerIntervalRef.current=setInterval(()=>{
        const left=Math.max(0,Math.round((timerEndTimeRef.current-Date.now())/1000));
        setTimerSecondsLeft(left);
        if(left===0){
          clearInterval(timerIntervalRef.current);
          fireNotif('Break over! 🎯','Ready for the next session?');
          setTimerPhase('break-done');
        }
      },500);
      return()=>clearInterval(timerIntervalRef.current);
    },[timerPhase]);

    // Keep note ref in sync so interval callbacks always read fresh value
    useEffect(()=>{ sessionNoteRef.current=sessionNote; },[sessionNote]);

    // Mobile resize listener
    useEffect(()=>{
      const fn=()=>setIsMobile(window.innerWidth<640);
      window.addEventListener('resize',fn);
      return()=>window.removeEventListener('resize',fn);
    },[]);

    // Sessions log load
    useEffect(()=>{
      if(view!=='calendar'||detailTab!=='sessions') return;
      const uid=userRef.current?.uid;
      if(!uid){ setLoadedSessions([]); return; }
      setSessionsLoading(true);
      fsLoadSessions(uid, selectedId)
        .then(s=>{ setLoadedSessions(s); setSessionsLoading(false); })
        .catch(()=>{ setLoadedSessions([]); setSessionsLoading(false); });
    },[view,detailTab,selectedId,authStatus]);

    // ── Daily target ──────────────────────────────────────────────
    function updateDailyTarget(habitId, delta) {
      setHabitsRaw(prev=>{
        const next=prev.map(h=> h.id!==habitId?h:{...h,dailyTarget:Math.max(0,(h.dailyTarget||0)+delta)});
        habitsRef.current=next;
        const upd=next.find(h=>h.id===habitId);
        if(upd) saveHabit(upd);
        return next;
      });
    }

    // ── Add / delete habit ────────────────────────────────────────
    function addHabit() {
      if(!newName.trim()) return;
      const nH={id:nextId,name:newName.trim(),emoji:newEmoji,colorIdx:newColorIdx,logs:{},
        createdAt:toDateKey(todayDate),totalDays:0,totalSessions:0,dailyTarget:0,lastSessionDate:'',todaySessions:0};
      const nId=nextId+1;
      setHabitsRaw(prev=>{
        const next=[...prev,nH]; habitsRef.current=next; nextIdRef.current=nId;
        if(canSave()){
          appHabitIdsRef.current=next.map(h=>h.id);
          fsWriteHabit(userRef.current.uid,nH).catch(console.error);
          fsWriteApp(userRef.current.uid,nId,next.map(h=>h.id)).catch(console.error);
        }
        return next;
      });
      setNextIdRaw(nId); setSelectedId(nH.id);
      setNewName(""); setNewEmoji("📚"); setNewColorIdx(3); setShowModal(false);
    }

    function deleteHabit(id) {
      if(habits.length<=1) return;
      setHabitsRaw(prev=>{
        const next=prev.filter(h=>h.id!==id); habitsRef.current=next;
        if(canSave()){
          appHabitIdsRef.current=next.map(h=>h.id);
          fsDeleteHabit(userRef.current.uid,id).catch(console.error);
          fsWriteApp(userRef.current.uid,nextIdRef.current,next.map(h=>h.id)).catch(console.error);
        }
        return next;
      });
      if(selectedId===id) setSelectedId(habits.find(h=>h.id!==id)?.id);
    }

    // ── Stats ─────────────────────────────────────────────────────
    const allStats = useMemo(()=>{
      const ty=todayDate.getFullYear(),tm=todayDate.getMonth();
      const dInM=new Date(ty,tm+1,0).getDate();
      const mTotal=Array.from({length:dInM},(_,i)=>i+1).filter(d=>new Date(ty,tm,d)<=todayDate).length;
      return habits.map(h=>{
        let streak=0; const chk=new Date(todayDate);
        while(h.logs[toDateKey(chk)]){streak++;chk.setDate(chk.getDate()-1);}
        const mk=`${ty}-${String(tm+1).padStart(2,'0')}`;
        const mDone=Object.keys(h.logs).filter(k=>k.startsWith(mk)&&h.logs[k]).length;
        return{id:h.id,streak,monthDone:mDone,monthTotal:mTotal,rate:mTotal>0?Math.round(mDone/mTotal*100):0};
      });
    },[habits]);

    const stats = useMemo(()=>{
      if(!selectedHabit) return {};
      const logs=selectedHabit.logs, total=selectedHabit.totalDays||0;
      let streak=0; let chk=new Date(todayDate);
      while(true){const k=toDateKey(chk);if(logs[k]){streak++;chk.setDate(chk.getDate()-1);}else break;}
      const mTotal=Array.from({length:daysInMonth},(_,i)=>i+1).filter(d=>new Date(viewYear,viewMonth,d)<=todayDate).length;
      const mDone=Array.from({length:daysInMonth},(_,i)=>i+1).filter(d=>logs[toDateKey(new Date(viewYear,viewMonth,d))]).length;
      const totalSessions=selectedHabit.totalSessions||0;
      const todayKey=toDateKey(todayDate);
      const todaySess=selectedHabit.lastSessionDate===todayKey?(selectedHabit.todaySessions||0):0;
      return{total,streak,monthTotal:mTotal,monthDone:mDone,rate:mTotal>0?Math.round(mDone/mTotal*100):0,
        totalSessions,avgSessionsPerDay:total>0?(totalSessions/total).toFixed(1):'—',
        todaySessions:todaySess,dailyTarget:selectedHabit.dailyTarget||0};
    },[selectedHabit,viewYear,viewMonth,daysInMonth]);

    const weeklyDigest = useMemo(()=>{
      const dow=todayDate.getDay();
      const monday=new Date(todayDate); monday.setDate(todayDate.getDate()-(dow===0?6:dow-1));
      const days=Array.from({length:7},(_,i)=>{
        const d=new Date(monday); d.setDate(monday.getDate()+i);
        return{key:toDateKey(d),label:['M','T','W','T','F','S','S'][i],isFuture:d>todayDate};
      });
      const todayKey=toDateKey(todayDate);
      return habits.map(h=>{
        const c=COLORS[h.colorIdx];
        return{id:h.id,emoji:h.emoji,name:h.name,colorIdx:h.colorIdx,hex:c.hex,
          days:days.map(d=>({...d,done:!d.isFuture&&!!h.logs[d.key]})),
          todaySessions:h.lastSessionDate===todayKey?(h.todaySessions||0):0,
          dailyTarget:h.dailyTarget||0};
      });
    },[habits]);

    const heatmapData = useMemo(()=>{
      if(!selectedHabit) return{weeks:[],monthLabels:[]};
      const qStart   = getQuarterStart(todayDate);
      // Align start to the Sunday on or before quarter start
      const startDate = new Date(qStart);
      startDate.setDate(qStart.getDate()-qStart.getDay());
      const weeks=[]; const cursor=new Date(startDate);
      while(true){
        const week=[];
        for(let d=0;d<7;d++){
          const key=toDateKey(cursor);
          const inQ=cursor>=qStart;
          week.push({key,done:inQ&&cursor<=todayDate&&!!selectedHabit.logs[key],isFuture:cursor>todayDate,inQ,month:cursor.getMonth(),day:cursor.getDate()});
          cursor.setDate(cursor.getDate()+1);
        }
        weeks.push(week);
        if(cursor>todayDate) break;
      }
      const monthLabels=[]; let prevM=-1;
      weeks.forEach((wk,wi)=>{ for(const c of wk){ if(c.inQ&&c.day===1&&c.month!==prevM){prevM=c.month;monthLabels.push({weekIdx:wi,label:MONTH_NAMES[c.month].slice(0,3)});break;} } });
      return{weeks,monthLabels};
    },[selectedHabit]);

            style={{flex:1,padding:'10px 4px',border:'none',background:'none',cursor:isTimer?'default':'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',
              color:isTimer?'#ef4444':'#9ca3af'}}>

            <span style={{fontSize:'10px',fontWeight:isTimer?700:400,color:isTimer?'#ef4444':'#9ca3af'}}>
              {timerPhase==='running'?fmt(timerSecondsLeft):timerPhase==='break'?`☕${fmt(timerSecondsLeft)}`:'Timer'}

        </button>

            </p>

        </div>

        <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'16px',padding:'16px 20px',marginBottom:'24px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'10px'}}>

              <p className="text-sm font-semibold text-green-800">Session complete! +1 for {th?.emoji} {th?.name}</p>

            <button onClick={async()=>{await saveCurrentNote(sessionNote);setTimerHabitId(null);setTimerPhase('selecting');}}

              ▶ Next Session
            </button>
            <button onClick={async()=>{await saveCurrentNote(sessionNote);cancelAll();}}
              style={{padding:'7px 14px',borderRadius:'10px',border:'1px solid #d1fae5',background:'white',color:'#374151',fontSize:'12px',cursor:'pointer'}}>

          <span style={{fontSize:isMobile?'20px':'24px'}}>☕</span>
          <div style={{flex:1}}>
            <p className="text-sm font-semibold text-blue-800">{breakDuration}-min break</p>
            {!isMobile && <p className="text-xs text-blue-500" style={{marginTop:'2px'}}>Relax — notification when done</p>}

          <span className={`${isMobile?'text-xl':'text-3xl'} font-bold text-blue-700`} style={{fontVariantNumeric:'tabular-nums',letterSpacing:'-0.5px'}}>{fmt(timerSecondsLeft)}</span>
          <button onClick={()=>{clearInterval(timerIntervalRef.current);setTimerPhase('break-done');}}
            style={{padding:'7px 12px',borderRadius:'10px',border:'1px solid #bfdbfe',background:'white',color:'#1d4ed8',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>⏭ Skip</button>

        </div>

      if(timerPhase==='break-done') return (
        <div style={{background:'#faf5ff',border:'1px solid #c4b5fd',borderRadius:'16px',display:'flex',alignItems:'center',gap:'16px',padding:'14px 20px',marginBottom:'24px'}}>
          <span style={{fontSize:'24px'}}>🎯</span>
          <div style={{flex:1}}>
            <p className="text-sm font-semibold text-purple-800">Break over! Ready to focus?</p>
            <p className="text-xs text-purple-500" style={{marginTop:'2px'}}>Start your next session whenever</p>
          </div>
          <button onClick={()=>{setTimerHabitId(null);setTimerPhase('selecting');}}
            style={{padding:'7px 14px',borderRadius:'10px',border:'none',background:'#7c3aed',color:'white',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>▶ Start Session</button>
          <button onClick={cancelAll} style={{background:'none',border:'none',cursor:'pointer',fontSize:'18px',color:'#9ca3af',padding:'4px 8px'}}>✕</button>
        </div>
      );
      return null;
    }

    // ── No-config setup screen ────────────────────────────────────
    function SetupScreen() {

        <div style={{maxWidth:'560px',margin:'40px auto',padding:'32px',background:'white',borderRadius:'20px',border:'1px solid #f3f4f6',boxShadow:'0 4px 24px rgba(0,0,0,0.08)'}}>

                              cursor,background:done?'':bg,color:done?'white':fg,boxShadow:shadow,transition:'all 0.15s'}}
                            onMouseEnter={e=>{if(!future&&!done)e.currentTarget.style.background='#e5e7eb';}}
                            onMouseLeave={e=>{if(!future&&!done)e.currentTarget.style.background=today?'#f3f4f6':bg;}}>
                            <span>{day}</span>
                            {done&&<span style={{fontSize:'11px',opacity:0.85}}>✓</span>}
                            {today&&!done&&<span style={{width:'4px',height:'4px',borderRadius:'50%',background:'#111827',marginTop:'2px'}}/>}
                          </button>
                        );
                      })}
                    </div>
                    <div style={{display:'flex',gap:'20px',marginTop:'20px',paddingTop:'16px',borderTop:'1px solid #f3f4f6',fontSize:'12px',color:'#9ca3af',flexWrap:'wrap'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'6px'}}><div className={`rounded-md ${color.bg}`} style={{width:'16px',height:'16px'}}/><span>Done</span></div>
                      <div style={{display:'flex',alignItems:'center',gap:'6px'}}><div style={{width:'16px',height:'16px',borderRadius:'6px',background:'#f3f4f6'}}/><span>Not done</span></div>
                      <span style={{marginLeft:'auto',fontStyle:'italic'}}>Tap any past day to toggle</span>
                    </div>
                  </div>
                )}

                {/* Sessions tab */}
                {detailTab==='sessions' && (
                  <div>
                    {sessionsLoading && <p className="text-sm text-gray-400 text-center" style={{padding:'40px'}}>Loading sessions…</p>}
                    {!sessionsLoading && loadedSessions.length===0 && (
                      <div className="bg-white border border-gray-100 rounded-2xl" style={{padding:'40px',textAlign:'center'}}>
                        <p style={{fontSize:'32px',marginBottom:'12px'}}>🍅</p>
                        <p className="text-sm font-medium text-gray-600">No sessions recorded yet</p>
                        <p className="text-xs text-gray-400" style={{marginTop:'6px'}}>Start a Pomodoro to track your work</p>
                      </div>
                    )}
                    {!sessionsLoading && loadedSessions.length>0 && (()=>{
                      const byDate=loadedSessions.reduce((acc,s)=>{
                        const d=s.endedAt?toDateKey(new Date(s.endedAt)):''; if(!acc[d]) acc[d]=[]; acc[d].push(s); return acc;
                      },{});
                      return(
                        <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
                          {Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).map(date=>{
                            const label=new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
                            return(
                              <div key={date} className="bg-white border border-gray-100 rounded-2xl" style={{padding:'16px 20px',boxShadow:'0 1px 3px rgba(0,0,0,0.06)'}}>
                                <p className="text-xs font-semibold text-gray-400" style={{textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'12px'}}>{label}</p>
                                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                                  {byDate[date].map((s,i)=>{
                                    const t=s.endedAt?new Date(s.endedAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'';
                                    return(
                                      <div key={i} style={{display:'flex',alignItems:'flex-start',gap:'12px',padding:'10px 12px',borderRadius:'10px',background:'#f9fafb'}}>
                                        <span style={{fontSize:'18px',marginTop:'1px'}}>🍅</span>
                                        <div style={{flex:1}}>
                                          <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                                            <span className="text-sm font-medium text-gray-700">{t}</span>
                                            <span style={{padding:'2px 8px',borderRadius:'99px',background:color.hex+'22',color:color.hex,fontSize:'11px',fontWeight:600}}>{s.durationMins} min</span>
                                            {s.tag&&<span style={{padding:'2px 8px',borderRadius:'99px',background:'#f3f4f6',color:'#6b7280',fontSize:'11px'}}>#{s.tag}</span>}
                                          </div>
                                          {s.note&&<p className="text-xs text-gray-500" style={{marginTop:'5px',lineHeight:'1.5'}}>{s.note}</p>}
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })()}
                  </div>
                )}

                {/* Year heatmap tab */}
                {detailTab==='year' && (()=>{
                  const qStartKey=toDateKey(getQuarterStart(todayDate));
                  const qDays=Object.keys(selectedHabit.logs).filter(k=>k>=qStartKey&&selectedHabit.logs[k]).length;
                  return(
                  <div className="bg-white border border-gray-100 rounded-2xl" style={{padding:'24px',overflowX:'auto'}}>
                    <div style={{display:'flex',alignItems:'baseline',gap:'10px',marginBottom:'16px'}}>
                      <p className="text-sm font-semibold text-gray-700">{getQuarterLabel(todayDate)}</p>
                      <p className="text-xs text-gray-400">logs reset each quarter · totals preserved</p>
                    </div>
                    <div style={{display:'flex',gap:'3px',marginBottom:'4px',paddingLeft:'24px'}}>
                      {heatmapData.weeks.map((_,wi)=>{
                        const ml=heatmapData.monthLabels.find(m=>m.weekIdx===wi);
                        return<div key={wi} style={{width:'13px',flexShrink:0,fontSize:'9px',color:'#9ca3af',whiteSpace:'nowrap',overflow:'visible'}}>{ml?ml.label:''}</div>;
                      })}
                    </div>
                    <div style={{display:'flex',gap:'3px'}}>
                      <div style={{display:'flex',flexDirection:'column',gap:'3px',marginRight:'4px'}}>
                        {['S','M','T','W','T','F','S'].map((d,i)=>(
                          <div key={i} style={{width:'16px',height:'13px',fontSize:'9px',color:'#9ca3af',display:'flex',alignItems:'center',justifyContent:'flex-end'}}>{i%2===1?d:''}</div>
                        ))}
                      </div>
                      <div style={{display:'flex',gap:'3px'}}>
                        {heatmapData.weeks.map((wk,wi)=>(
                          <div key={wi} style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                            {wk.map((cell,di)=>(
                              <div key={di} title={cell.inQ?cell.key:''}
                                style={{width:'13px',height:'13px',borderRadius:'3px',
                                  background:!cell.inQ?'transparent':cell.isFuture?'#f9fafb':cell.done?color.hex:'#ebedf0'}} />
                            ))}
                          </div>
                        ))}
                      </div>
                    </div>
                    <p className="text-xs text-gray-400 text-center" style={{marginTop:'16px'}}>
                      {qDays} days completed this quarter · {selectedHabit.totalDays||0} total ever
                    </p>
                  </div>
                  );
                })()}
              </>);
            })()}
          </>)}
        </div>

        {/* Add Habit Modal */}
        {showModal && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:isMobile?'flex-end':'center',justifyContent:'center',zIndex:50,padding:isMobile?'0':'16px'}}>
            <div className="bg-white" style={{width:'100%',maxWidth:'440px',padding:'24px',boxShadow:'0 25px 50px rgba(0,0,0,0.25)',borderRadius:isMobile?'20px 20px 0 0':'16px',maxHeight:isMobile?'92vh':'none',overflowY:'auto',paddingBottom:isMobile?'calc(24px + env(safe-area-inset-bottom,0px))':'24px'}}>
              <h3 className="text-lg font-bold text-gray-900" style={{marginBottom:'20px'}}>Add New Habit</h3>
              <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
                <div>
                  <label className="block text-sm font-medium text-gray-700" style={{marginBottom:'6px'}}>Name</label>
                  <input type="text" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addHabit()}
                    placeholder="e.g. Meditate, Journal…" className="border border-gray-200 rounded-xl text-sm"
                    style={{width:'100%',padding:'10px 16px',outline:'none'}} autoFocus />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700" style={{marginBottom:'8px'}}>Emoji</label>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
                    {EMOJIS.map(e=>(
                      <button key={e} onClick={()=>setNewEmoji(e)}
                        style={{fontSize:'20px',padding:'8px',borderRadius:'8px',border:'none',cursor:'pointer',
                          background:newEmoji===e?'#111827':'#f3f4f6',transform:newEmoji===e?'scale(1.1)':'scale(1)',transition:'all 0.15s'}}>
                        {e}
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700" style={{marginBottom:'8px'}}>Color</label>
                  <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                    {COLORS.map((c,i)=>(
                      <button key={i} onClick={()=>setNewColorIdx(i)} className={c.bg}
                        style={{width:'32px',height:'32px',borderRadius:'50%',border:'none',cursor:'pointer',
                          boxShadow:newColorIdx===i?'0 0 0 2px white, 0 0 0 4px #111827':'none',
                          transform:newColorIdx===i?'scale(1.1)':'scale(1)',transition:'all 0.15s'}} />
                    ))}
                  </div>
                </div>
              </div>
              <div style={{display:'flex',gap:'12px',marginTop:'24px'}}>
                <button onClick={()=>setShowModal(false)} className="border border-gray-200 text-gray-600 text-sm font-medium rounded-xl"
                  style={{flex:1,padding:'10px',cursor:'pointer',background:'white'}}>Cancel</button>
                <button onClick={addHabit} disabled={!newName.trim()} className="bg-gray-900 text-white text-sm font-medium rounded-xl"
                  style={{flex:1,padding:'10px',border:'none',cursor:newName.trim()?'pointer':'not-allowed',opacity:newName.trim()?1:0.4}}>
                  Add Habit
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Pomodoro selecting modal */}
        {timerPhase==='selecting' && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:isMobile?'flex-end':'center',justifyContent:'center',zIndex:50,padding:isMobile?'0':'16px'}}>
            <div className="bg-white" style={{width:'100%',maxWidth:'420px',padding:'24px',boxShadow:'0 25px 50px rgba(0,0,0,0.25)',borderRadius:isMobile?'20px 20px 0 0':'16px',maxHeight:isMobile?'92vh':'none',overflowY:'auto',paddingBottom:isMobile?'calc(24px + env(safe-area-inset-bottom,0px))':'24px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'4px'}}>
                <span style={{fontSize:'22px'}}>🍅</span>
                <h3 className="text-lg font-bold text-gray-900">Start Pomodoro</h3>
              </div>
              <p className="text-sm text-gray-400" style={{marginBottom:'16px'}}>Choose a habit and session length</p>
              <p className="text-xs font-semibold text-gray-500" style={{marginBottom:'8px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Duration</p>
              <div style={{display:'flex',gap:'8px',marginBottom:'14px'}}>
                {[15,25,50].map(d=>(
                  <button key={d} onClick={()=>setTimerDuration(d)}
                    style={{flex:1,padding:'8px',borderRadius:'10px',border:'1px solid',
                      borderColor:timerDuration===d?'#111827':'#e5e7eb',
                      background:timerDuration===d?'#111827':'white',
                      color:timerDuration===d?'white':'#374151',
                      fontSize:'13px',fontWeight:600,cursor:'pointer',transition:'all 0.15s'}}>
                    {d} min
                  </button>
                ))}
              </div>
              <p className="text-xs font-semibold text-gray-500" style={{marginBottom:'8px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Tag (optional)</p>
              <input type="text" value={timerTag} onChange={e=>setTimerTag(e.target.value)}
                placeholder="e.g. deep-work, review, lecture…"
                className="border border-gray-200 rounded-xl text-sm"
                style={{width:'100%',padding:'9px 14px',outline:'none',marginBottom:'14px'}} />
              <p className="text-xs font-semibold text-gray-500" style={{marginBottom:'8px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Habit</p>
              <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'18px'}}>
                {habits.map(h=>{
                  const c=COLORS[h.colorIdx]; const sel=timerHabitId===h.id;
                  return(
                    <div key={h.id} onClick={()=>setTimerHabitId(h.id)}
                      className={`border rounded-xl cursor-pointer transition-all ${sel?`${c.light} ${c.border}`:'border-gray-100 hover:bg-gray-50'}`}
                      style={{display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px'}}>
                      <span style={{fontSize:'20px'}}>{h.emoji}</span>
                      <span className={`text-sm font-medium ${sel?c.text:'text-gray-700'}`}>{h.name}</span>
                      {sel && <span className={`ml-auto text-xs font-semibold ${c.text}`}>✓</span>}
                    </div>
                  );
                })}
              </div>
              <div style={{display:'flex',gap:'12px'}}>
                <button onClick={()=>{setTimerPhase('idle');setTimerHabitId(null);}}
                  className="border border-gray-200 text-gray-600 text-sm font-medium rounded-xl"
                  style={{flex:1,padding:'10px',cursor:'pointer',background:'white'}}>Cancel</button>
                <button onClick={()=>timerHabitId&&startPomodoro(timerHabitId)} disabled={!timerHabitId}
                  className="bg-gray-900 text-white text-sm font-medium rounded-xl"
                  style={{flex:1,padding:'10px',border:'none',cursor:timerHabitId?'pointer':'not-allowed',opacity:timerHabitId?1:0.4}}>
                  🍅 Start {timerDuration} min
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
